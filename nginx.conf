# 红灯笼食府管理系统 - Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/ 并创建软链接到 sites-enabled/
# ln -s /etc/nginx/sites-available/red-lantern.conf /etc/nginx/sites-enabled/

upstream red_lantern_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;  # 修改为你的域名或 IP

    # 重定向到 HTTPS (可选，需要配置 SSL 证书)
    # return 301 https://$server_name$request_uri;

    # 保活设置
    keepalive_timeout 65s;

    # 日志
    access_log /var/log/nginx/red-lantern.access.log;
    error_log /var/log/nginx/red-lantern.error.log;

    # 客户端请求限制
    client_max_body_size 10M;

    # SSE 实时推送端点（必须放在通用 location / 之前）
    location /api/admin/events {
        proxy_pass http://red_lantern_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键：关闭缓冲，数据实时推送到客户端
        proxy_buffering off;
        proxy_cache off;

        # SSE 长连接超时（24小时）
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;

        # 分块传输
        chunked_transfer_encoding on;
    }

    # 通用反向代理到 Node.js 后端
    location / {
        proxy_pass http://red_lantern_backend;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存（图片上传目录）
    location /sources/ {
        proxy_pass http://red_lantern_backend;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }

    # 前端静态资源缓存（Vite 构建产物）
    location /assets/ {
        proxy_pass http://red_lantern_backend;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        expires 30d;
    }
}

# WebSocket upgrade 变量映射（放在 http 块中，若使用 include 方式需移到外层）
# 如果此文件被 include 在 server 块级别，需将以下内容添加到 nginx.conf 的 http 块中：
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

