# 红灯笼食府管理系统 - Apache 配置
# 将此文件复制到 Apache 配置目录并启用：
#   Debian/Ubuntu: cp apache.conf /etc/apache2/sites-available/red-lantern.conf
#                  a2ensite red-lantern && systemctl reload apache2
#   CentOS/RHEL:   cp apache.conf /etc/httpd/conf.d/red-lantern.conf
#                  systemctl reload httpd

<VirtualHost *:80>
    ServerName your-domain.com
    ServerAdmin webmaster@your-domain.com

    # 保活设置
    KeepAlive On
    KeepAliveTimeout 65
    MaxKeepAliveRequests 200

    # 日志
    ErrorLog /var/log/apache2/red-lantern-error.log
    CustomLog /var/log/apache2/red-lantern-access.log combined

    # 启用必要模块（如未启用，请运行）：
    #   a2enmod proxy proxy_http proxy_wstunnel rewrite headers

    # ===== SSE 实时推送端点（必须放在通用 ProxyPass 之前）=====
    # flushpackets=auto 确保 SSE 数据不被缓冲，实时推送
    ProxyPass /api/admin/events http://127.0.0.1:3000/api/admin/events flushpackets=auto
    ProxyPassReverse /api/admin/events http://127.0.0.1:3000/api/admin/events

    # SSE 长连接超时（24小时，单位：秒）
    ProxyTimeout 86400

    # ===== 通用反向代理 =====
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # 传递真实客户端信息
    <Proxy *>
        Require all granted
    </Proxy>

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # ===== WebSocket 支持 =====
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]

    # ===== 静态资源缓存 =====
    # 图片上传目录
    <Location /sources/>
        Header set Cache-Control "public, max-age=604800"
    </Location>

    # Vite 构建产物（带 hash，可长期缓存）
    <Location /assets/>
        Header set Cache-Control "public, max-age=2592000, immutable"
    </Location>

    # 禁用对 API 路径的缓存
    <Location /api/>
        Header set Cache-Control "no-store, no-cache, must-revalidate"
    </Location>
</VirtualHost>

# HTTPS 配置（可选，需要 SSL 证书）
# <VirtualHost *:443>
#     ServerName your-domain.com
#     ServerAdmin webmaster@your-domain.com
#
#     SSLEngine on
#     SSLCertificateFile    /etc/letsencrypt/live/your-domain.com/fullchain.pem
#     SSLCertificateKeyFile /etc/letsencrypt/live/your-domain.com/privkey.pem
#
#     # 其余配置同上...
# </VirtualHost>
